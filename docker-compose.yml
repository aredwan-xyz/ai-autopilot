version: "3.9"

services:
  autopilot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./credentials:/app/credentials
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: celery -A src.tasks worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  scheduler:
    build: .
    command: python -m src.orchestrator start
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
